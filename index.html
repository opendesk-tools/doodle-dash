<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Doodle Dash</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Lilita+One&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

<!-- PeerJS for WebRTC multiplayer over a free public signaling server -->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<!-- Game logic (pure functions + host state machine) -->
<script src="game-core.js"></script>

<style>
  :root {
    --paper: #faf4e6;
    --paper-shadow: #e8dfc7;
    --ink: #111111;
    --pink: #ff4d8d;
    --blue: #3a86ff;
    --yellow: #ffd23f;
    --lime: #8ce99a;
    --purple: #9d4edd;
    --orange: #ff9e3d;
    --red: #e63946;
    --teal: #06b6d4;
    --shadow-offset: 6px;
    --border-w: 3px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 16px;
    overflow: hidden;
    /* subtle paper noise */
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.015) 1px, transparent 1px),
      radial-gradient(circle at 70% 60%, rgba(0,0,0,0.02) 1px, transparent 1px),
      radial-gradient(circle at 40% 80%, rgba(0,0,0,0.015) 1px, transparent 1px);
    background-size: 40px 40px, 60px 60px, 80px 80px;
  }

  /* Floating decorative doodles in the background */
  .doodles {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .doodle {
    position: absolute;
    opacity: 0.55;
    animation: float 12s ease-in-out infinite;
  }
  .doodle:nth-child(1) { top: 8%; left: 5%;   animation-delay: 0s; }
  .doodle:nth-child(2) { top: 20%; right: 8%; animation-delay: -2s; }
  .doodle:nth-child(3) { bottom: 15%; left: 10%; animation-delay: -4s; }
  .doodle:nth-child(4) { bottom: 8%; right: 12%; animation-delay: -6s; }
  .doodle:nth-child(5) { top: 55%; left: 3%;  animation-delay: -3s; }
  .doodle:nth-child(6) { top: 40%; right: 3%; animation-delay: -5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50%      { transform: translateY(-20px) rotate(5deg); }
  }

  h1, h2, h3 { font-family: 'Bagel Fat One', cursive; font-weight: 400; letter-spacing: 0.5px; }

  /* Chunky neobrutalist button */
  .btn {
    font-family: 'Lilita One', sans-serif;
    font-size: 18px;
    letter-spacing: 0.5px;
    background: var(--yellow);
    color: var(--ink);
    border: var(--border-w) solid var(--ink);
    padding: 12px 22px;
    cursor: pointer;
    box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--ink);
    transition: transform 0.08s ease, box-shadow 0.08s ease;
    user-select: none;
    text-transform: uppercase;
  }
  .btn:hover:not(:disabled) { transform: translate(-2px, -2px); box-shadow: calc(var(--shadow-offset) + 2px) calc(var(--shadow-offset) + 2px) 0 var(--ink); }
  .btn:active:not(:disabled) { transform: translate(var(--shadow-offset), var(--shadow-offset)); box-shadow: 0 0 0 var(--ink); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--ink); }
  .btn.pink { background: var(--pink); color: white; }
  .btn.blue { background: var(--blue); color: white; }
  .btn.lime { background: var(--lime); }
  .btn.small { font-size: 14px; padding: 8px 14px; box-shadow: 4px 4px 0 var(--ink); }
  .btn.small:hover:not(:disabled) { box-shadow: 6px 6px 0 var(--ink); }
  .btn.small:active:not(:disabled) { box-shadow: 0 0 0 var(--ink); transform: translate(4px, 4px); }

  input[type="text"] {
    font-family: 'DM Sans', sans-serif;
    font-size: 17px;
    padding: 12px 16px;
    border: var(--border-w) solid var(--ink);
    background: white;
    outline: none;
    width: 100%;
    box-shadow: 4px 4px 0 var(--ink);
    transition: box-shadow 0.1s ease, transform 0.1s ease;
  }
  input[type="text"]:focus { box-shadow: 6px 6px 0 var(--ink); transform: translate(-1px, -1px); }

  .card {
    background: white;
    border: var(--border-w) solid var(--ink);
    box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--ink);
    padding: 24px;
  }

  /* === SCREEN SYSTEM === */
  .screen { display: none; position: relative; z-index: 1; height: 100%; width: 100%; }
  .screen.active { display: flex; }

  /* === MENU SCREEN === */
  #menu {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 20px;
  }
  .title {
    font-size: clamp(48px, 10vw, 110px);
    line-height: 0.95;
    text-align: center;
    letter-spacing: -2px;
    animation: titlePop 0.6s cubic-bezier(.34,1.56,.64,1);
  }
  .title .word1 { color: var(--pink); display: inline-block; transform: rotate(-3deg); text-shadow: 4px 4px 0 var(--ink); }
  .title .word2 { color: var(--blue); display: inline-block; transform: rotate(2deg); text-shadow: 4px 4px 0 var(--ink); margin-left: 8px; }
  @keyframes titlePop {
    0%   { transform: scale(0.7); opacity: 0; }
    70%  { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }
  .subtitle {
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 18px;
    color: #555;
    text-align: center;
    max-width: 500px;
  }

  .menu-card { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 16px; }
  .menu-card label { font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #333; }
  .menu-card .row { display: flex; gap: 10px; }
  .menu-card .row input { flex: 1; }

  .divider {
    text-align: center;
    color: #888;
    font-weight: 700;
    letter-spacing: 2px;
    font-size: 13px;
    position: relative;
    margin: 4px 0;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 2px;
    background: #ccc;
  }
  .divider::before { left: 0; }
  .divider::after  { right: 0; }

  /* === LOBBY SCREEN === */
  #lobby {
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 20px;
    overflow-y: auto;
  }
  .lobby-title { font-size: clamp(36px, 6vw, 60px); color: var(--ink); }
  .room-code-box {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 18px 28px;
    background: var(--yellow);
    border: var(--border-w) solid var(--ink);
    box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--ink);
  }
  .room-code-box .label { font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .room-code-box .code { font-family: 'Bagel Fat One'; font-size: 40px; letter-spacing: 4px; cursor: pointer; }
  .room-code-box .hint { font-size: 11px; color: #444; }

  .players-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    width: 100%;
    max-width: 720px;
  }
  .player-chip {
    background: white;
    border: var(--border-w) solid var(--ink);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 4px 4px 0 var(--ink);
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { transform: translateY(-10px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .player-chip .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Lilita One'; font-size: 18px; flex-shrink: 0;
  }
  .player-chip .pname { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .player-chip .crown { margin-left: auto; font-size: 18px; }

  .lobby-settings {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  }
  .setting {
    background: white;
    border: var(--border-w) solid var(--ink);
    padding: 8px 14px;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .setting label { font-weight: 700; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
  .setting select {
    border: 2px solid var(--ink);
    padding: 4px 8px;
    font-family: 'DM Sans'; font-weight: 700;
    background: var(--paper);
    outline: none;
    cursor: pointer;
  }
  .setting select:disabled { opacity: 0.5; cursor: not-allowed; }

  /* === GAME SCREEN === */
  #game {
    flex-direction: column;
    height: 100vh;
    padding: 10px;
    gap: 10px;
  }
  .topbar {
    display: flex; align-items: center; gap: 14px;
    background: white;
    border: var(--border-w) solid var(--ink);
    padding: 10px 16px;
    box-shadow: 4px 4px 0 var(--ink);
    flex-shrink: 0;
  }
  .topbar .round-info { font-family: 'Lilita One'; font-size: 16px; color: #666; }
  .word-display {
    flex: 1;
    text-align: center;
    font-family: 'Bagel Fat One';
    font-size: 28px;
    letter-spacing: 8px;
    color: var(--ink);
    user-select: none;
    overflow: hidden;
    white-space: nowrap;
  }
  .word-display .hint-char { display: inline-block; min-width: 14px; border-bottom: 3px solid var(--ink); margin: 0 2px; }
  .word-display .space { display: inline-block; width: 16px; }
  .timer {
    font-family: 'Bagel Fat One';
    font-size: 32px;
    min-width: 60px;
    text-align: center;
    padding: 4px 14px;
    background: var(--lime);
    border: var(--border-w) solid var(--ink);
    transition: background 0.3s;
  }
  .timer.warn { background: var(--orange); animation: pulse 0.6s infinite; }
  .timer.danger { background: var(--pink); color: white; animation: pulse 0.4s infinite; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.08); }
  }

  .game-main {
    display: grid;
    grid-template-columns: 220px 1fr 300px;
    gap: 10px;
    flex: 1;
    min-height: 0;
  }

  /* Players panel */
  .panel {
    background: white;
    border: var(--border-w) solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    display: flex; flex-direction: column;
    min-height: 0;
    overflow: hidden;
  }
  .panel-header {
    background: var(--ink);
    color: var(--paper);
    padding: 8px 14px;
    font-family: 'Lilita One';
    font-size: 14px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .panel-body { padding: 8px; overflow-y: auto; flex: 1; min-height: 0; }

  .score-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border: 2px solid var(--ink);
    margin-bottom: 6px;
    background: var(--paper);
    transition: background 0.3s, transform 0.2s;
  }
  .score-row.drawing { background: var(--yellow); }
  .score-row.guessed { background: var(--lime); }
  .score-row.self    { border-width: 3px; }
  .score-row .avatar { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--ink); display: flex; align-items: center; justify-content: center; font-family: 'Lilita One'; font-size: 14px; flex-shrink: 0; }
  .score-row .info { flex: 1; min-width: 0; }
  .score-row .sname { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .score-row .score { font-family: 'Lilita One'; font-size: 14px; color: #666; }
  .score-row .indicator { font-size: 16px; }

  /* Canvas area */
  .canvas-wrap {
    display: flex; flex-direction: column;
    background: white;
    border: var(--border-w) solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    overflow: hidden;
    min-height: 0;
  }
  .canvas-holder {
    flex: 1;
    position: relative;
    background: white;
    overflow: hidden;
    min-height: 0;
  }
  canvas#board {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
    touch-action: none;
  }
  canvas#board.view-only { cursor: default; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(250, 244, 230, 0.95);
    z-index: 5;
    pointer-events: none;
  }
  .overlay.interactive { pointer-events: auto; }
  .overlay.hidden { display: none; }
  .overlay-card {
    background: white;
    border: var(--border-w) solid var(--ink);
    box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--ink);
    padding: 24px 32px;
    text-align: center;
    max-width: 90%;
    max-height: 90%;
    overflow-y: auto;
  }
  .overlay-card h2 { font-size: 32px; margin-bottom: 10px; }
  .word-choices { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 14px; }

  /* Toolbar */
  .tools {
    display: flex; gap: 6px; align-items: center;
    padding: 8px;
    border-top: var(--border-w) solid var(--ink);
    background: var(--paper);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .tools.hidden { display: none; }
  .color-swatch {
    width: 26px; height: 26px;
    border: 2px solid var(--ink);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { transform: scale(1.25); box-shadow: 0 0 0 2px white, 0 0 0 4px var(--ink); }
  .tool-sep { width: 2px; height: 26px; background: var(--ink); margin: 0 4px; }
  .size-btn {
    width: 30px; height: 30px;
    border: 2px solid var(--ink);
    background: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.1s;
  }
  .size-btn:hover { background: var(--yellow); }
  .size-btn.active { background: var(--ink); }
  .size-btn.active .dot { background: white; }
  .size-btn .dot { border-radius: 50%; background: var(--ink); }
  .tool-btn {
    height: 30px;
    padding: 0 10px;
    border: 2px solid var(--ink);
    background: white;
    cursor: pointer;
    font-family: 'Lilita One';
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex; align-items: center; gap: 4px;
    transition: background 0.1s;
  }
  .tool-btn:hover { background: var(--yellow); }
  .tool-btn.danger:hover { background: var(--pink); color: white; }

  /* Chat panel */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 8px;
    display: flex; flex-direction: column; gap: 4px;
    min-height: 0;
  }
  .chat-msg {
    padding: 6px 10px;
    border: 2px solid var(--ink);
    background: var(--paper);
    font-size: 14px;
    word-wrap: break-word;
    animation: msgIn 0.2s ease;
  }
  @keyframes msgIn {
    from { transform: translateX(10px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  .chat-msg .chat-name { font-weight: 700; margin-right: 4px; }
  .chat-msg.correct { background: var(--lime); font-weight: 700; }
  .chat-msg.close   { background: var(--yellow); }
  .chat-msg.system  { background: var(--ink); color: var(--paper); font-style: italic; border-color: var(--ink); }
  .chat-msg.system-join  { background: var(--blue); color: white; border-color: var(--ink); }
  .chat-msg.system-leave { background: var(--red); color: white; border-color: var(--ink); }

  .chat-input-row {
    display: flex; gap: 6px; padding: 8px;
    border-top: var(--border-w) solid var(--ink);
    background: var(--paper);
    flex-shrink: 0;
  }
  .chat-input-row input {
    flex: 1; box-shadow: 3px 3px 0 var(--ink);
    padding: 8px 10px; font-size: 14px;
  }
  .chat-input-row input:focus { box-shadow: 5px 5px 0 var(--ink); }
  .chat-input-row input:disabled { background: #eee; cursor: not-allowed; }

  /* === ROUND END OVERLAY === */
  .round-end-card { min-width: 320px; }
  .round-end-card .reveal {
    font-family: 'Bagel Fat One';
    font-size: 38px;
    color: var(--pink);
    margin: 10px 0 16px;
    text-shadow: 3px 3px 0 var(--ink);
  }
  .scores-grid {
    display: flex; flex-direction: column; gap: 6px;
    margin-top: 12px;
    text-align: left;
  }
  .score-entry {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px;
    border: 2px solid var(--ink);
    background: var(--paper);
    font-weight: 700;
  }
  .score-entry .earned { color: var(--pink); font-family: 'Lilita One'; }

  /* === GAME END SCREEN === */
  .podium {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 20px;
    margin: 24px 0;
    min-height: 240px;
  }
  .podium-col {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    animation: riseUp 0.8s cubic-bezier(.34,1.56,.64,1);
  }
  .podium-col .avatar-big {
    width: 70px; height: 70px; border-radius: 50%;
    border: var(--border-w) solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Lilita One'; font-size: 32px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .podium-col .winner-name { font-family: 'Lilita One'; font-size: 18px; max-width: 120px; text-align: center; overflow-wrap: break-word; }
  .podium-col .winner-score { font-family: 'Bagel Fat One'; font-size: 24px; }
  .podium-col .block {
    border: var(--border-w) solid var(--ink);
    width: 100px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bagel Fat One'; font-size: 44px; color: white;
    text-shadow: 3px 3px 0 var(--ink);
    box-shadow: var(--shadow-offset) var(--shadow-offset) 0 var(--ink);
  }
  .podium-col.first  .block { background: var(--yellow); color: var(--ink); text-shadow: 3px 3px 0 white; height: 180px; }
  .podium-col.second .block { background: #c0c0c0; height: 130px; }
  .podium-col.third  .block { background: #cd7f32; height: 90px; }
  @keyframes riseUp {
    from { transform: translateY(100px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  /* === STATUS / TOAST === */
  .connection-status {
    position: fixed; top: 12px; right: 12px;
    background: var(--ink); color: var(--paper);
    padding: 6px 12px;
    font-family: 'Lilita One'; font-size: 12px;
    letter-spacing: 1px; text-transform: uppercase;
    z-index: 100;
    border: 2px solid var(--ink);
    display: none;
  }
  .connection-status.show { display: block; }
  .connection-status.error { background: var(--red); }

  .toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink); color: var(--paper);
    padding: 10px 20px;
    font-family: 'Lilita One'; font-size: 14px;
    border: 2px solid var(--ink);
    z-index: 200;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Mobile */
  @media (max-width: 900px) {
    .game-main { grid-template-columns: 1fr; grid-template-rows: 110px 1fr 180px; }
    .panel-body { max-height: 100%; }
    .word-display { font-size: 20px; letter-spacing: 4px; }
    .topbar { flex-wrap: wrap; gap: 8px; }
  }
</style>
</head>
<body>

<!-- Floating background doodles -->
<div class="doodles">
  <svg class="doodle" width="80" height="80" viewBox="0 0 80 80"><path d="M10,40 Q25,10 40,40 T70,40" stroke="#ff4d8d" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
  <svg class="doodle" width="60" height="60" viewBox="0 0 60 60"><path d="M30,5 L37,22 L55,25 L41,37 L45,55 L30,46 L15,55 L19,37 L5,25 L23,22 Z" fill="#ffd23f" stroke="#111" stroke-width="3" stroke-linejoin="round"/></svg>
  <svg class="doodle" width="70" height="70" viewBox="0 0 70 70"><circle cx="35" cy="35" r="25" stroke="#3a86ff" stroke-width="4" fill="none"/><circle cx="35" cy="35" r="15" stroke="#3a86ff" stroke-width="4" fill="none"/></svg>
  <svg class="doodle" width="90" height="50" viewBox="0 0 90 50"><path d="M5,25 Q20,5 35,25 T65,25 T85,25" stroke="#9d4edd" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
  <svg class="doodle" width="50" height="50" viewBox="0 0 50 50"><path d="M25,5 L45,25 L25,45 L5,25 Z" fill="#8ce99a" stroke="#111" stroke-width="3" stroke-linejoin="round"/></svg>
  <svg class="doodle" width="70" height="70" viewBox="0 0 70 70"><path d="M35,10 L42,28 L60,30 L46,43 L50,60 L35,51 L20,60 L24,43 L10,30 L28,28 Z" fill="none" stroke="#ff9e3d" stroke-width="3" stroke-linejoin="round"/></svg>
</div>

<!-- ========== MENU ========== -->
<div id="menu" class="screen active">
  <h1 class="title"><span class="word1">Doodle</span><span class="word2">Dash</span></h1>

    </div>
    <button class="btn pink" id="createBtn">🎨 Create a Room</button>
    <div class="divider">OR</div>
    <div>
      <label for="codeInput">Join with a room code</label>
      <div class="row">
        <input type="text" id="codeInput" maxlength="6" placeholder="ABC123" style="text-transform: uppercase; letter-spacing: 3px; font-family: 'Lilita One'; font-size: 20px;" />

        <option value="3" selected>3</option>

        <option value="8">8</option>

        <option value="40">40s</option>

<div class="connection-status" id="connStatus"></div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DOODLE DASH — Peer-to-peer drawing & guessing game
   Host is authoritative; peers are views + input sources.
   ============================================================ */

/* ---------- Word bank ---------- */
const WORDS = [
  // animals
  "cat","dog","elephant","giraffe","penguin","octopus","butterfly","shark","dolphin","tiger",
  "lion","monkey","rabbit","snake","kangaroo","crocodile","flamingo","owl","bee","spider",
  "turtle","horse","cow","sheep","pig","chicken","duck","fish","whale","bear",
  "fox","wolf","hedgehog","squirrel","koala","panda","zebra","rhino","hippo","camel",
  // objects
  "telephone","umbrella","guitar","piano","bicycle","airplane","rocket","submarine","telescope","microscope",
  "hammer","scissors","pencil","backpack","glasses","hat","sock","shoe","watch","key",
  "lamp","clock","chair","table","bed","couch","fridge","oven","toaster","kettle",
  "bottle","cup","plate","fork","spoon","knife","candle","book","newspaper","laptop",
  "camera","headphones","television","mirror","window","door","ladder","bucket","broom","shovel",
  // food
  "pizza","hamburger","hotdog","sandwich","taco","sushi","pasta","noodles","soup","salad",
  "banana","apple","strawberry","pineapple","watermelon","grapes","orange","lemon","carrot","broccoli",
  "cake","cookie","donut","cupcake","muffin","pancake","waffle","icecream","chocolate","popcorn",
  // nature
  "tree","flower","mushroom","cactus","leaf","cloud","rainbow","lightning","mountain","volcano",
  "beach","island","river","waterfall","desert","forest","sun","moon","star","planet",
  // actions
  "jumping","sleeping","dancing","swimming","cooking","reading","running","crying","laughing","fishing",
  // vehicles
  "car","truck","bus","boat","motorcycle","scooter","train","helicopter","tractor","ambulance",
  // other
  "castle","pirate","wizard","ghost","robot","dragon","mermaid","alien","dinosaur","knight",
  "snowman","scarecrow","lighthouse","windmill","bridge","tent","igloo","treasure","anchor","compass",
  "guitar","violin","drum","trumpet","saxophone","microphone","volleyball","basketball","soccer","tennis",
  "balloon","gift","crown","ring","medal","trophy","sandwich","pretzel","fireworks","snowflake",
  "rainbow","tornado","earthquake","waterfall","bonfire","spaceship","satellite","telescope","skateboard","kite"
];
// de-duplicate just in case
const WORD_SET = Array.from(new Set(WORDS));

/* ---------- DOM ---------- */
const $ = id => document.getElementById(id);
const screens = { menu: $('menu'), lobby: $('lobby'), game: $('game') };
function showScreen(name) { Object.values(screens).forEach(s => s.classList.remove('active')); screens[name].classList.add('active'); }

/* ---------- Global state ---------- */
const ROOM_PREFIX = 'doodledash-';
let myName = '';
let myPeerId = null;
let myColor = randomColor();
let peer = null;        // PeerJS instance
let isHost = false;
let hostConn = null;    // (peer only) connection to host
const peerConns = new Map(); // (host only) peerId -> DataConnection
let roomCode = null;

// Game state (shared shape; host maintains the truth)
let G = freshGameState();

function freshGameState() {
  return {
    phase: 'lobby',          // lobby | choosing | drawing | roundEnd | gameEnd
    players: [],             // [{id, name, color, score, connected}]
    hostId: null,
    drawerId: null,
    currentWord: null,       // full word (only host + drawer know raw; we send masked to others)
    maskedWord: '',          // what non-drawers see
    wordLength: 0,
    timeLeft: 0,
    maxTime: 80,
    maxRounds: 3,
    round: 1,
    drawOrder: [],           // ids in rotation for this round
    drawerIndex: 0,
    guessedIds: [],          // who guessed this turn
    chat: [],                // {name, text, kind}
  };
}

/* ---------- Small utilities ---------- */
function randomColor() {
  const palette = ['#ff4d8d','#3a86ff','#8ce99a','#ffd23f','#9d4edd','#ff9e3d','#06b6d4','#e63946','#6b4423','#111111'];
  return palette[Math.floor(Math.random() * palette.length)];
}
function randomCode() { const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s = ''; for (let i=0;i<6;i++) s += chars[Math.floor(Math.random()*chars.length)]; return s; }
function initials(name) { const parts = (name||'?').trim().split(/\s+/); return ((parts[0]?.[0]||'?')+(parts[1]?.[0]||'')).toUpperCase(); }
function now() { return Date.now(); }
function toast(msg, ms = 2400) { const t = $('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toast._t); toast._t = setTimeout(() => t.classList.remove('show'), ms); }
function setStatus(msg, isError=false) { const el = $('connStatus'); if (!msg) { el.classList.remove('show'); return; } el.textContent = msg; el.classList.toggle('error', isError); el.classList.add('show'); }
function shuffle(a) { const arr = [...a]; for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i+1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function maskWord(w) {
  // reveal spaces/hyphens, keep letters hidden as '_'
  return w.split('').map(ch => /[a-zA-Z]/.test(ch) ? '_' : ch).join('');
}
function normalizeGuess(s) { return (s||'').toLowerCase().trim().replace(/\s+/g,' '); }
function levenshtein(a, b) {
  if (a === b) return 0;
  const m = a.length, n = b.length;
  if (!m) return n; if (!n) return m;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i=0;i<=m;i++) dp[i][0] = i;
  for (let j=0;j<=n;j++) dp[0][j] = j;
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) {
    const cost = a[i-1] === b[j-1] ? 0 : 1;
    dp[i][j] = Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
  }
  return dp[m][n];
}

/* ============================================================
   PEER SETUP
   ============================================================ */
function initPeer(customId) {
  return new Promise((resolve, reject) => {
    try {
      const p = customId ? new Peer(customId) : new Peer();
      let settled = false;
      p.on('open', id => { if (settled) return; settled = true; resolve(p); });
      p.on('error', err => {
        console.error('peer error:', err);
        if (!settled) { settled = true; reject(err); }
        else {
          const t = (err && err.type) || '';
          if (t === 'peer-unavailable') toast('Host is unreachable. Check the code.');
          else if (t === 'network' || t === 'disconnected' || t === 'server-error') setStatus('Network issue', true);
          else toast('Connection error: ' + (err.message || t));
        }
      });
      p.on('disconnected', () => { setStatus('Reconnecting…', true); try { p.reconnect(); } catch(e){} });
    } catch(e) { reject(e); }
  });
}

/* ---------- CREATE ROOM (as host) ---------- */
async function createRoom() {
  const name = $('nameInput').value.trim();
  if (!name) { toast('Enter your name first'); return; }
  myName = name;
  $('createBtn').disabled = true;
  $('joinBtn').disabled = true;
  setStatus('Creating room…');
  try {
    roomCode = randomCode();
    peer = await initPeer(ROOM_PREFIX + roomCode);
    myPeerId = peer.id;
    isHost = true;
    G = freshGameState();
    G.hostId = myPeerId;
    G.players.push({ id: myPeerId, name: myName, color: myColor, score: 0, connected: true });

    peer.on('connection', conn => {
      conn.on('open', () => {
        // Wait for the join message before deciding anything — late joiners are handled in the handler.
      });
      conn.on('data', (msg) => handleHostMessage(conn, msg));
      conn.on('close', () => hostOnPeerDisconnect(conn.peer));
      conn.on('error', () => hostOnPeerDisconnect(conn.peer));
    });

    setStatus('');
    enterLobby();
  } catch (e) {
    console.error(e);
    toast('Failed to create room. Try again.');
    setStatus('');
    $('createBtn').disabled = false;
    $('joinBtn').disabled = false;
  }
}

/* ---------- JOIN ROOM (as peer) ---------- */
async function joinRoom() {
  const name = $('nameInput').value.trim();
  const code = $('codeInput').value.trim().toUpperCase();
  if (!name) { toast('Enter your name first'); return; }
  if (!code || code.length < 4) { toast('Enter a valid room code'); return; }
  myName = name;
  roomCode = code;
  $('createBtn').disabled = true;
  $('joinBtn').disabled = true;
  setStatus('Connecting…');
  try {
    peer = await initPeer();
    myPeerId = peer.id;
    isHost = false;
    const targetId = ROOM_PREFIX + code;
    hostConn = peer.connect(targetId, { reliable: true });
    let opened = false;
    const timeout = setTimeout(() => {
      if (!opened) { toast('Could not reach host. Check the code.'); resetToMenu(); }
    }, 10000);
    hostConn.on('open', () => {
      opened = true;
      clearTimeout(timeout);
      setStatus('');
      // Send join request
      hostConn.send({ type: 'join', name: myName, color: myColor });
      enterLobby();
    });
    hostConn.on('data', msg => handlePeerMessage(msg));
    hostConn.on('close', () => {
      toast('Host disconnected');
      setTimeout(resetToMenu, 1500);
    });
    hostConn.on('error', err => {
      console.error('hostConn error:', err);
      if (!opened) { toast('Connection failed'); resetToMenu(); }
    });
  } catch(e) {
    console.error(e);
    toast('Failed to connect. Try again.');
    resetToMenu();
  }
}

function resetToMenu() {
  try { if (peer) peer.destroy(); } catch(e){}
  peer = null; hostConn = null; peerConns.clear(); isHost = false; roomCode = null;
  G = freshGameState();
  $('createBtn').disabled = false;
  $('joinBtn').disabled = false;
  setStatus('');
  showScreen('menu');
}

/* ============================================================
   HOST MESSAGE HANDLING
   ============================================================ */
function hostBroadcast(msg, exceptId) {
  for (const [pid, conn] of peerConns) {
    if (pid === exceptId) continue;
    try { conn.send(msg); } catch(e) { console.warn('send fail', pid, e); }
  }
}
function hostSendTo(pid, msg) {
  const c = peerConns.get(pid);
  if (c) try { c.send(msg); } catch(e) {}
}

function handleHostMessage(conn, msg) {
  if (!msg || typeof msg !== 'object') return;
  const fromId = conn.peer;
  switch (msg.type) {
    case 'join': {
      const safeName = (msg.name || 'Player').slice(0, 16);
      const color = msg.color || randomColor();

      // Reconnection: player with same id already known
      const existing = G.players.find(p => p.id === fromId);
      if (existing) {
        const wasConnected = existing.connected;
        existing.connected = true;
        existing.name = safeName;
        existing.color = color;
        peerConns.set(fromId, conn);
        try {
          conn.send({
            type: 'welcome',
            yourId: fromId,
            state: publicState(),
            currentWord: (G.drawerId === fromId) ? G.currentWord : null, // only restore to the drawer
            chatHistory: G.chat.slice(-40),
          });
        } catch (e) {}
        // Replay canvas if a round is currently being drawn
        if (G.phase === 'drawing' && G._canvasEvents && G._canvasEvents.length) {
          try { conn.send({ type: 'canvasReplay', events: G._canvasEvents }); } catch (e) {}
        }
        hostBroadcast({ type: 'state', state: publicState() }, fromId);
        if (!wasConnected) pushChat({ kind: 'join', text: `${safeName} reconnected` });
        return;
      }

      // Capacity check
      const activeCount = G.players.filter(p => p.connected).length;
      if (activeCount >= 12) {
        try { conn.send({ type: 'reject', reason: 'Room full (max 12).' }); } catch (e) {}
        return;
      }

      // New player — accept regardless of game phase
      G.players.push({ id: fromId, name: safeName, color, score: 0, connected: true });
      peerConns.set(fromId, conn);

      try {
        conn.send({
          type: 'welcome',
          yourId: fromId,
          state: publicState(),
          chatHistory: G.chat.slice(-40),
        });
      } catch (e) {}

      // If a round is mid-draw, replay canvas strokes so the new player sees what's already drawn
      if (G.phase === 'drawing' && G._canvasEvents && G._canvasEvents.length) {
        try { conn.send({ type: 'canvasReplay', events: G._canvasEvents }); } catch (e) {}
      }

      hostBroadcast({ type: 'state', state: publicState() }, fromId);
      const joinMsg = (G.phase === 'lobby')
        ? `${safeName} joined the room`
        : `${safeName} joined mid-game — will draw next round`;
      pushChat({ kind: 'join', text: joinMsg });
      break;
    }
    case 'chat': {
      const p = G.players.find(pl => pl.id === fromId);
      if (!p) return;
      const text = (msg.text || '').slice(0, 60).trim();
      if (!text) return;
      handleHostGuess(p, text);
      break;
    }
    case 'stroke':
    case 'clear':
    case 'fill':
    case 'undo': {
      // Only valid if sender is the current drawer and we're in drawing phase
      if (G.phase !== 'drawing' || fromId !== G.drawerId) return;
      // Record so late joiners can catch up
      recordCanvasEvent(msg);
      // Relay to everyone else
      hostBroadcast(msg, fromId);
      break;
    }
    case 'wordChoice': {
      if (G.phase !== 'choosing' || fromId !== G.drawerId) return;
      const pick = (msg.word || '').toString();
      if (!G._wordChoices || !G._wordChoices.includes(pick)) return;
      startDrawing(pick);
      break;
    }
    case 'settings': {
      if (G.phase !== 'lobby') return;
      if (fromId !== G.hostId) return; // only host can adjust; non-hosts can't trigger this anyway but defense in depth
      // (Host UI changes call setSettings directly; we don't expect this from peers)
      break;
    }
    case 'startGame': {
      // Peers shouldn't trigger this; ignore
      break;
    }
  }
}

function hostOnPeerDisconnect(pid) {
  peerConns.delete(pid);
  const p = G.players.find(pl => pl.id === pid);
  if (!p) return;
  pushChat({ kind: 'leave', text: `${p.name} left the room` });
  if (G.phase === 'lobby') {
    G.players = G.players.filter(pl => pl.id !== pid);
  } else {
    p.connected = false;
    // If the drawer leaves mid-round, end the round
    if (G.drawerId === pid && (G.phase === 'drawing' || G.phase === 'choosing')) {
      endRoundDueToDisconnect();
      return;
    }
  }
  hostBroadcast({ type: 'state', state: publicState() });
}

/* ---------- Chat + guess logic ---------- */
function pushChat(entry) {
  // entry: {kind: 'msg'|'correct'|'close'|'system'|'join'|'leave', name?, text}
  G.chat.push(entry);
  if (G.chat.length > 80) G.chat.shift();
  if (isHost) hostBroadcast({ type: 'chat', entry });
  renderChatEntry(entry);
}

function handleHostGuess(player, text) {
  // Drawer cannot guess; send their chat as a normal message only to themselves silently (ignore)
  if (G.phase === 'drawing' && player.id === G.drawerId) return;
  // If they already guessed, their chat is also blocked (so they can't reveal)
  if (G.phase === 'drawing' && G.guessedIds.includes(player.id)) return;

  if (G.phase === 'drawing') {
    const guess = normalizeGuess(text);
    const target = normalizeGuess(G.currentWord);
    if (guess === target) {
      // correct!
      G.guessedIds.push(player.id);
      const guesserPts = computeGuesserPoints();
      const drawerPts  = computeDrawerBonus();
      player.score += guesserPts;
      const drawer = G.players.find(p => p.id === G.drawerId);
      if (drawer) drawer.score += drawerPts;
      pushChat({ kind: 'correct', text: `✅ ${player.name} guessed the word! (+${guesserPts})` });
      hostBroadcast({ type: 'state', state: publicState() });
      // All non-drawer connected players guessed? End the round early.
      const guessersLeft = G.players.filter(p => p.id !== G.drawerId && p.connected && !G.guessedIds.includes(p.id));
      if (guessersLeft.length === 0) endRound('everyone');
      return;
    }
    // "close" check: Levenshtein <=1 on guess of same length
    if (Math.abs(guess.length - target.length) <= 1 && levenshtein(guess, target) <= 1 && guess.length >= 3) {
      // show to the guesser only, as a private hint
      hostSendTo(player.id, { type: 'chat', entry: { kind: 'close', text: `"${text}" is close!` } });
      // Others see the guess normally
      pushChat({ kind: 'msg', name: player.name, text });
      return;
    }
  }
  // normal chat
  pushChat({ kind: 'msg', name: player.name, text });
}

function computeGuesserPoints() {
  // Earlier guessers get more points. Based on time remaining + order bonus.
  const order = G.guessedIds.length; // 1st correct = 1, 2nd = 2, ...
  const timeRatio = G.maxTime ? (G.timeLeft / G.maxTime) : 0;
  const base = 50 + Math.round(timeRatio * 100); // 50..150
  const orderBonus = Math.max(0, 50 - (order - 1) * 15); // 50,35,20,5,0...
  return base + orderBonus;
}
function computeDrawerBonus() {
  // Drawer earns a bit each time someone guesses
  return 30;
}

/* ============================================================
   GAME FLOW (HOST ONLY)
   ============================================================ */
function hostStartGame() {
  if (!isHost) return;
  if (G.phase !== 'lobby') return;
  if (G.players.filter(p => p.connected).length < 2) { toast('Need at least 2 players'); return; }
  G.maxRounds = parseInt($('roundsSelect').value) || 3;
  G.maxTime = parseInt($('timeSelect').value) || 80;
  G.round = 1;
  for (const p of G.players) p.score = 0;
  showScreen('game');
  startRound();
}

function startRound() {
  // New draw order: shuffled connected players
  G.drawOrder = shuffle(G.players.filter(p => p.connected).map(p => p.id));
  G.drawerIndex = 0;
  beginTurn();
}

function beginTurn() {
  G.guessedIds = [];
  G.currentWord = null;
  G.maskedWord = '';
  G.timeLeft = G.maxTime;
  G._canvasEvents = []; // cleared each turn; used to replay strokes for late joiners
  // find drawer
  while (G.drawerIndex < G.drawOrder.length) {
    const id = G.drawOrder[G.drawerIndex];
    const pl = G.players.find(p => p.id === id);
    if (pl && pl.connected) break;
    G.drawerIndex++;
  }
  if (G.drawerIndex >= G.drawOrder.length) {
    // round complete
    if (G.round >= G.maxRounds) { endGame(); return; }
    G.round++;
    pushChat({ kind: 'system', text: `— Round ${G.round} —` });
    startRound();
    return;
  }
  G.drawerId = G.drawOrder[G.drawerIndex];
  G.phase = 'choosing';
  // Pick 3 word choices
  const choices = [];
  const pool = shuffle(WORD_SET);
  for (let i = 0; i < pool.length && choices.length < 3; i++) choices.push(pool[i]);
  G._wordChoices = choices;

  // Tell drawer their choices; tell others who's choosing
  const drawer = G.players.find(p => p.id === G.drawerId);
  if (drawer) pushChat({ kind: 'system', text: `${drawer.name} is choosing a word…` });

  // Clear canvas for everyone
  hostBroadcast({ type: 'clear' });
  clearCanvas();

  hostBroadcast({ type: 'state', state: publicState() });
  if (G.drawerId === myPeerId) {
    onHostChoosingUI(choices);
  }
  // Auto-pick if drawer doesn't choose in 15s
  clearTimeout(G._chooseTimer);
  G._chooseTimer = setTimeout(() => {
    if (G.phase === 'choosing') {
      startDrawing(choices[Math.floor(Math.random() * choices.length)]);
    }
  }, 15000);
}

function startDrawing(word) {
  clearTimeout(G._chooseTimer);
  G.phase = 'drawing';
  G.currentWord = word;
  G.maskedWord = maskWord(word);
  G.wordLength = word.length;
  G._hintsGiven = 0;
  G._startTime = now();

  // Send to drawer: the full word. To others: masked.
  const drawer = G.players.find(p => p.id === G.drawerId);
  if (drawer && drawer.id === myPeerId) {
    // we're the drawer; update UI directly
    renderGameFromState();
  }
  hostSendTo(G.drawerId, { type: 'wordReveal', word });

  hostBroadcast({ type: 'state', state: publicState() });
  // Start timer
  clearInterval(G._tickTimer);
  G._tickTimer = setInterval(hostTick, 1000);
}

function hostTick() {
  if (G.phase !== 'drawing') { clearInterval(G._tickTimer); return; }
  G.timeLeft--;
  // Hints: at ~66% and ~33% time remaining, reveal a letter
  const elapsed = G.maxTime - G.timeLeft;
  const want1 = Math.floor(G.maxTime * 0.35);
  const want2 = Math.floor(G.maxTime * 0.70);
  if (G._hintsGiven < 1 && elapsed >= want1) revealOneLetter();
  if (G._hintsGiven < 2 && elapsed >= want2) revealOneLetter();

  // broadcast time + masked word (cheap)
  hostBroadcast({ type: 'tick', timeLeft: G.timeLeft, maskedWord: G.maskedWord });
  // local update
  G.timeLeft = G.timeLeft; // noop, already set
  renderTimerAndWord();

  if (G.timeLeft <= 0) { endRound('time'); }
}

function revealOneLetter() {
  G._hintsGiven++;
  const word = G.currentWord;
  const cur = G.maskedWord.split('');
  const hiddenIdx = [];
  for (let i = 0; i < word.length; i++) if (cur[i] === '_') hiddenIdx.push(i);
  if (!hiddenIdx.length) return;
  // pick one to reveal (but never reveal all)
  if (hiddenIdx.length <= 1) return;
  const pick = hiddenIdx[Math.floor(Math.random() * hiddenIdx.length)];
  cur[pick] = word[pick];
  G.maskedWord = cur.join('');
}

function endRound(reason) {
  if (G.phase === 'roundEnd' || G.phase === 'gameEnd') return;
  G.phase = 'roundEnd';
  clearInterval(G._tickTimer);
  const revealed = G.currentWord || '?';
  pushChat({ kind: 'system', text: `The word was: ${revealed.toUpperCase()}` });
  hostBroadcast({ type: 'roundEnd', word: revealed, state: publicState() });
  showRoundEndOverlay(revealed);

  // Advance
  clearTimeout(G._nextTimer);
  G._nextTimer = setTimeout(() => {
    G.drawerIndex++;
    beginTurn();
  }, 5000);
}

function endRoundDueToDisconnect() {
  if (G.phase !== 'drawing' && G.phase !== 'choosing') return;
  pushChat({ kind: 'system', text: `Drawer left. Skipping turn…` });
  clearInterval(G._tickTimer);
  clearTimeout(G._chooseTimer);
  G.phase = 'roundEnd';
  hostBroadcast({ type: 'roundEnd', word: G.currentWord || '(skipped)', state: publicState() });
  showRoundEndOverlay(G.currentWord || '(skipped)');
  clearTimeout(G._nextTimer);
  G._nextTimer = setTimeout(() => {
    G.drawerIndex++;
    beginTurn();
  }, 3000);
}

function endGame() {
  G.phase = 'gameEnd';
  hostBroadcast({ type: 'state', state: publicState() });
  showGameEndOverlay();
}

/* ---------- Public state (what we tell everyone) ---------- */
function publicState() {
  return {
    phase: G.phase,
    players: G.players.map(p => ({ id: p.id, name: p.name, color: p.color, score: p.score, connected: p.connected })),
    hostId: G.hostId,
    drawerId: G.drawerId,
    maskedWord: G.maskedWord,
    wordLength: G.wordLength,
    timeLeft: G.timeLeft,
    maxTime: G.maxTime,
    maxRounds: G.maxRounds,
    round: G.round,
    guessedIds: G.guessedIds,
  };
}

/* ============================================================
   PEER MESSAGE HANDLING (I am a non-host)
   ============================================================ */
function handlePeerMessage(msg) {
  if (!msg || typeof msg !== 'object') return;
  switch (msg.type) {
    case 'welcome':
      myPeerId = msg.yourId;
      if (Array.isArray(msg.chatHistory)) {
        G.chat = [...msg.chatHistory];
      }
      applyPublicState(msg.state);
      // If host sent our current word back (reconnect while drawing), show it
      if (msg.currentWord) {
        G.currentWord = msg.currentWord;
        renderGameFromState();
      }
      break;
    case 'reject':
      toast(msg.reason || 'Rejected by host');
      setTimeout(resetToMenu, 1500);
      break;
    case 'state':
      applyPublicState(msg.state);
      break;
    case 'tick':
      G.timeLeft = msg.timeLeft;
      G.maskedWord = msg.maskedWord || G.maskedWord;
      renderTimerAndWord();
      break;
    case 'wordReveal':
      // I am the drawer
      G.currentWord = msg.word;
      renderGameFromState();
      break;
    case 'roundEnd':
      G.currentWord = msg.word;
      applyPublicState(msg.state);
      showRoundEndOverlay(msg.word);
      break;
    case 'chat':
      pushChatRemote(msg.entry);
      break;
    case 'stroke':
      drawRemoteStroke(msg);
      break;
    case 'clear':
      clearCanvas();
      break;
    case 'fill':
      fillCanvas(msg.color);
      break;
    case 'undo':
      undoLastStroke();
      break;
    case 'canvasReplay':
      // Late-joiner catch-up: replay all canvas events we missed
      if (Array.isArray(msg.events)) {
        // Make sure the game screen is visible and canvas is sized before drawing
        if (!screens.game.classList.contains('active')) showScreen('game');
        resizeCanvas();
        for (const ev of msg.events) {
          if (ev.type === 'stroke') drawRemoteStroke(ev);
          else if (ev.type === 'clear') clearCanvas();
          else if (ev.type === 'fill') fillCanvas(ev.color);
        }
      }
      break;
  }
}

function pushChatRemote(entry) {
  G.chat.push(entry);
  if (G.chat.length > 80) G.chat.shift();
  renderChatEntry(entry);
}

function applyPublicState(s) {
  const prevPhase = G.phase;
  Object.assign(G, s);
  // If phase changed to game-screen-relevant, ensure we're on game screen
  if (s.phase === 'lobby') {
    if (!screens.lobby.classList.contains('active')) enterLobby();
    renderLobby();
  } else {
    if (!screens.game.classList.contains('active')) showScreen('game');
    renderGameFromState();
  }
  if (s.phase === 'gameEnd') showGameEndOverlay();
}

/* ============================================================
   UI RENDERING
   ============================================================ */
function enterLobby() {
  showScreen('lobby');
  $('roomCode').textContent = roomCode;
  $('roomCodeBox').onclick = () => {
    if (navigator.clipboard) navigator.clipboard.writeText(roomCode).then(() => toast('Code copied!')).catch(()=>toast('Copy failed'));
  };
  // Only host sees settings and start button
  $('lobbySettings').style.display = isHost ? 'flex' : 'none';
  $('startBtn').style.display = isHost ? 'inline-block' : 'none';
  $('lobbyNote').textContent = isHost ? 'You are the host — you control game settings and start the round.' : 'Waiting for the host to start the game…';
  $('roundsSelect').disabled = !isHost;
  $('timeSelect').disabled = !isHost;
  renderLobby();
}

function renderLobby() {
  const list = $('playersList');
  list.innerHTML = '';
  for (const p of G.players) {
    if (!p.connected) continue;
    const chip = document.createElement('div');
    chip.className = 'player-chip';
    chip.innerHTML = `
      <div class="avatar" style="background:${p.color}; color:${contrastText(p.color)};">${initials(p.name)}</div>
      <div class="pname">${escapeHtml(p.name)}</div>
      ${p.id === G.hostId ? '<span class="crown" title="Host">👑</span>' : ''}
    `;
    list.appendChild(chip);
  }
  $('startBtn').disabled = G.players.filter(p => p.connected).length < 2;
}

function renderGameFromState() {
  // Scores panel
  const sc = $('scoresList');
  sc.innerHTML = '';
  const sorted = [...G.players].sort((a,b) => b.score - a.score);
  for (const p of sorted) {
    const row = document.createElement('div');
    let cls = 'score-row';
    if (p.id === G.drawerId) cls += ' drawing';
    else if (G.guessedIds.includes(p.id)) cls += ' guessed';
    if (p.id === myPeerId) cls += ' self';
    row.className = cls;
    row.innerHTML = `
      <div class="avatar" style="background:${p.color}; color:${contrastText(p.color)};">${initials(p.name)}</div>
      <div class="info">
        <div class="sname">${escapeHtml(p.name)}${p.id === myPeerId ? ' (you)' : ''}</div>
        <div class="score">${p.score} pts${p.connected ? '' : ' · offline'}</div>
      </div>
      <div class="indicator">${p.id === G.drawerId ? '✏️' : (G.guessedIds.includes(p.id) ? '✅' : '')}</div>
    `;
    sc.appendChild(row);
  }

  // Round info
  $('roundInfo').textContent = `Round ${G.round} / ${G.maxRounds}`;
  renderTimerAndWord();
  renderChatFromState();
  setupCanvasForPhase();
}

function renderTimerAndWord() {
  const t = $('timer');
  t.textContent = Math.max(0, G.timeLeft);
  t.classList.remove('warn','danger');
  if (G.timeLeft <= 10) t.classList.add('danger');
  else if (G.timeLeft <= 25) t.classList.add('warn');
  // Word display
  const wd = $('wordDisplay');
  if (G.phase === 'drawing') {
    if (G.drawerId === myPeerId && G.currentWord) {
      wd.innerHTML = `<span style="color:#ff4d8d">${escapeHtml(G.currentWord.toUpperCase())}</span> <span style="font-family:'DM Sans';font-size:13px;letter-spacing:normal;color:#666">(${G.wordLength} letters)</span>`;
    } else {
      // render masked with underlines
      const w = G.maskedWord || '_'.repeat(G.wordLength);
      wd.innerHTML = w.split('').map(ch => {
        if (ch === ' ') return '<span class="space"></span>';
        if (ch === '_') return '<span class="hint-char">&nbsp;</span>';
        return `<span class="hint-char" style="border-bottom:none; color:#3a86ff">${escapeHtml(ch.toUpperCase())}</span>`;
      }).join('');
      wd.innerHTML += ` <span style="font-family:'DM Sans';font-size:13px;letter-spacing:normal;color:#666">(${G.wordLength})</span>`;
    }
  } else {
    wd.textContent = G.phase === 'choosing' ? 'Choosing a word…' : (G.phase === 'roundEnd' ? 'Round over' : '');
  }
}

function renderChatFromState() {
  const box = $('chatMessages');
  box.innerHTML = '';
  for (const e of G.chat) renderChatEntry(e, true);
  box.scrollTop = box.scrollHeight;
}
function renderChatEntry(e, silent=false) {
  const box = $('chatMessages');
  const div = document.createElement('div');
  let cls = 'chat-msg';
  if (e.kind === 'correct') cls += ' correct';
  else if (e.kind === 'close') cls += ' close';
  else if (e.kind === 'system') cls += ' system';
  else if (e.kind === 'join') cls += ' system-join';
  else if (e.kind === 'leave') cls += ' system-leave';
  div.className = cls;
  if (e.kind === 'msg' && e.name) {
    div.innerHTML = `<span class="chat-name">${escapeHtml(e.name)}:</span> ${escapeHtml(e.text)}`;
  } else {
    div.textContent = e.text;
  }
  box.appendChild(div);
  if (!silent) box.scrollTop = box.scrollHeight;
}

/* ---------- Overlays ---------- */
function setupCanvasForPhase() {
  const overlay = $('canvasOverlay');
  const card = $('overlayCard');
  const tools = $('tools');
  const chatIn = $('chatInput');

  // Tools visible only to drawer during drawing
  const amDrawer = G.drawerId === myPeerId;
  tools.classList.toggle('hidden', !(G.phase === 'drawing' && amDrawer));

  // Chat input behaviour
  chatIn.disabled = (G.phase === 'drawing' && amDrawer) || (G.phase === 'drawing' && G.guessedIds.includes(myPeerId));
  chatIn.placeholder = chatIn.disabled
    ? (amDrawer ? "You're drawing — no chat!" : 'You already guessed it!')
    : 'Type your guess…';

  // Canvas cursor
  $('board').classList.toggle('view-only', !amDrawer || G.phase !== 'drawing');

  // Overlay logic
  if (G.phase === 'choosing') {
    overlay.classList.remove('hidden');
    overlay.classList.remove('interactive');
    if (amDrawer) {
      overlay.classList.add('interactive');
      const picks = G._wordChoices || [];
      card.innerHTML = `
        <h2>Pick a word to draw</h2>
        <p style="color:#666;margin-bottom:8px">You have 15 seconds</p>
        <div class="word-choices">
          ${picks.map(w => `<button class="btn pink small" data-pick="${escapeAttr(w)}">${escapeHtml(w)}</button>`).join('')}
        </div>`;
      card.querySelectorAll('[data-pick]').forEach(b => b.onclick = () => {
        const w = b.getAttribute('data-pick');
        startDrawing(w); // host-only can actually act; non-hosts wouldn't be here since we set _wordChoices locally
      });
    } else {
      const drawer = G.players.find(p => p.id === G.drawerId);
      card.innerHTML = `<h2>${escapeHtml(drawer ? drawer.name : 'Someone')} is picking a word…</h2>
        <p style="color:#666;margin-top:8px">Get ready to guess!</p>`;
    }
  } else if (G.phase === 'drawing') {
    overlay.classList.add('hidden');
  } else if (G.phase === 'lobby') {
    overlay.classList.add('hidden');
  }
}

function showRoundEndOverlay(word) {
  const overlay = $('canvasOverlay');
  const card = $('overlayCard');
  overlay.classList.remove('hidden');
  overlay.classList.remove('interactive');
  const sorted = [...G.players].sort((a,b) => b.score - a.score);
  card.innerHTML = `
    <h2>Round over</h2>
    <div class="reveal">${escapeHtml((word||'').toUpperCase())}</div>
    <div style="color:#666;font-size:13px">The word was revealed above.</div>
    <div class="scores-grid">
      ${sorted.map(p => `<div class="score-entry">
        <span>${escapeHtml(p.name)}</span>
        <span class="earned">${p.score} pts</span>
      </div>`).join('')}
    </div>
    <div style="margin-top:12px;color:#666;font-size:13px">Next turn in a few seconds…</div>
  `;
}

function showGameEndOverlay() {
  showScreen('game');
  const overlay = $('canvasOverlay');
  const card = $('overlayCard');
  overlay.classList.remove('hidden');
  overlay.classList.add('interactive');
  const sorted = [...G.players].sort((a,b) => b.score - a.score);
  const top3 = sorted.slice(0, 3);
  // Podium arrangement: 2nd, 1st, 3rd
  const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
  const classes = ['second','first','third'];
  const medals = ['🥈','🥇','🥉'];
  const podiumHtml = podiumOrder.map((p, idx) => {
    // re-derive real placement from sorted index
    const place = sorted.indexOf(p);
    const cls = classes[[1,0,2][idx]]; // visual order
    const medal = medals[place];
    return `<div class="podium-col ${cls}">
      <div class="avatar-big" style="background:${p.color};color:${contrastText(p.color)};">${initials(p.name)}</div>
      <div class="winner-name">${escapeHtml(p.name)}</div>
      <div class="winner-score">${p.score} pts</div>
      <div class="block">${medal}</div>
    </div>`;
  }).join('');
  card.innerHTML = `
    <h2>🏆 Game Over!</h2>
    <div class="podium">${podiumHtml || '<div style="color:#666">No scores</div>'}</div>
    <div class="scores-grid" style="max-height:180px; overflow-y:auto">
      ${sorted.map((p,i) => `<div class="score-entry">
        <span>${i+1}. ${escapeHtml(p.name)}</span>
        <span class="earned">${p.score} pts</span>
      </div>`).join('')}
    </div>
    <div style="margin-top:16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap">
      ${isHost ? '<button class="btn lime" id="playAgainBtn">Play Again</button>' : ''}
      <button class="btn" id="endLeaveBtn">Back to Menu</button>
    </div>
  `;
  const pa = $('playAgainBtn');
  if (pa) pa.onclick = () => {
    // reset to lobby
    G.phase = 'lobby';
    for (const p of G.players) p.score = 0;
    overlay.classList.add('hidden');
    hostBroadcast({ type: 'state', state: publicState() });
    enterLobby();
    renderLobby();
  };
  $('endLeaveBtn').onclick = () => resetToMenu();
}

/* UI helper invoked from host flow */
function onHostChoosingUI(choices) {
  // host is the drawer — render word choices immediately without waiting for state round-trip
  G._wordChoices = choices;
  renderGameFromState();
  setupCanvasForPhase();
}

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s); }
function contrastText(hex) {
  // returns white or black for best contrast
  const h = hex.replace('#',''); if (h.length !== 6) return '#000';
  const r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
  const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
  return lum > 0.6 ? '#000' : '#fff';
}

/* ============================================================
   CANVAS / DRAWING
   ============================================================ */
const canvas = $('board');
const ctx = canvas.getContext('2d');
let drawState = {
  drawing: false,
  color: '#111111',
  size: 6,
  lastX: 0, lastY: 0,
  strokes: [], // array of stroke objects for undo (drawer-only local copy)
  currentStroke: null,
};

function resizeCanvas() {
  const holder = canvas.parentElement;
  const rect = holder.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const w = Math.max(100, rect.width);
  const h = Math.max(100, rect.height);
  // Preserve image on resize
  const old = document.createElement('canvas');
  old.width = canvas.width; old.height = canvas.height;
  old.getContext('2d').drawImage(canvas, 0, 0);
  canvas.width = Math.floor(w * dpr);
  canvas.height = Math.floor(h * dpr);
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  // restore old onto new (scaled)
  ctx.drawImage(old, 0, 0, canvas.width/dpr, canvas.height/dpr);
}

window.addEventListener('resize', () => { resizeCanvas(); });
// initial size after screen change
function ensureCanvasSized() { if (screens.game.classList.contains('active')) resizeCanvas(); }
setInterval(ensureCanvasSized, 500); // cheap safety

function canvasPoint(evt) {
  const rect = canvas.getBoundingClientRect();
  const x = (evt.clientX - rect.left) / rect.width;  // 0..1
  const y = (evt.clientY - rect.top) / rect.height;
  return { x, y };
}

function strokeLine(fromX, fromY, toX, toY, color, size) {
  // coords are normalized 0..1
  const w = canvas.clientWidth, h = canvas.clientHeight;
  ctx.strokeStyle = color;
  ctx.lineWidth = size;
  ctx.beginPath();
  ctx.moveTo(fromX * w, fromY * h);
  ctx.lineTo(toX * w, toY * h);
  ctx.stroke();
}

function canStartDrawing() {
  return G.phase === 'drawing' && G.drawerId === myPeerId;
}

function onPointerDown(e) {
  if (!canStartDrawing()) return;
  e.preventDefault();
  const p = canvasPoint(e);
  drawState.drawing = true;
  drawState.lastX = p.x; drawState.lastY = p.y;
  drawState.currentStroke = { color: drawState.color, size: drawState.size, pts: [[p.x, p.y]] };
  // emit a "dot" to ourselves and broadcast
  strokeLine(p.x, p.y, p.x+0.0001, p.y+0.0001, drawState.color, drawState.size);
  sendStroke({ type: 'stroke', x1: p.x, y1: p.y, x2: p.x+0.0001, y2: p.y+0.0001, color: drawState.color, size: drawState.size, startStroke: true });
  canvas.setPointerCapture && e.pointerId && canvas.setPointerCapture(e.pointerId);
}
function onPointerMove(e) {
  if (!drawState.drawing || !canStartDrawing()) return;
  e.preventDefault();
  const p = canvasPoint(e);
  strokeLine(drawState.lastX, drawState.lastY, p.x, p.y, drawState.color, drawState.size);
  sendStroke({ type: 'stroke', x1: drawState.lastX, y1: drawState.lastY, x2: p.x, y2: p.y, color: drawState.color, size: drawState.size });
  drawState.currentStroke.pts.push([p.x, p.y]);
  drawState.lastX = p.x; drawState.lastY = p.y;
}
function onPointerUp(e) {
  if (!drawState.drawing) return;
  drawState.drawing = false;
  if (drawState.currentStroke) {
    drawState.strokes.push(drawState.currentStroke);
    if (drawState.strokes.length > 200) drawState.strokes.shift();
  }
  drawState.currentStroke = null;
}

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointermove', onPointerMove);
window.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('pointercancel', onPointerUp);
canvas.addEventListener('pointerleave', onPointerUp);

function recordCanvasEvent(msg) {
  // Called on host only. Appends canvas events for late-joiner replay.
  if (!G._canvasEvents) G._canvasEvents = [];
  if (msg.type === 'clear') {
    G._canvasEvents = [{ type: 'clear' }];
  } else if (msg.type === 'fill') {
    G._canvasEvents.push({ type: 'fill', color: msg.color });
  } else if (msg.type === 'stroke') {
    G._canvasEvents.push({
      type: 'stroke',
      x1: msg.x1, y1: msg.y1, x2: msg.x2, y2: msg.y2,
      color: msg.color, size: msg.size,
    });
  }
}

function sendStroke(msg) {
  if (isHost) {
    // If the host is currently the drawer, record locally for replay.
    if (G.phase === 'drawing' && G.drawerId === myPeerId) recordCanvasEvent(msg);
    // relay to all peers directly
    for (const [pid, c] of peerConns) { try { c.send(msg); } catch(e){} }
  } else {
    if (hostConn) { try { hostConn.send(msg); } catch(e){} }
  }
}

function drawRemoteStroke(msg) {
  if (msg.type !== 'stroke') return;
  strokeLine(msg.x1, msg.y1, msg.x2, msg.y2, msg.color, msg.size);
}

function clearCanvas() {
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  drawState.strokes = [];
}
function fillCanvas(color) {
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle = color;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
  const dpr = window.devicePixelRatio || 1;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
function undoLastStroke() {
  // Redraw from stroke history (drawer-local). Simpler broadcast: we resend a full clear + every stroke.
  drawState.strokes.pop();
  clearCanvas();
  for (const s of drawState.strokes) {
    for (let i = 1; i < s.pts.length; i++) {
      strokeLine(s.pts[i-1][0], s.pts[i-1][1], s.pts[i][0], s.pts[i][1], s.color, s.size);
    }
  }
}

/* Tools UI */
document.querySelectorAll('.color-swatch').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    drawState.color = el.getAttribute('data-color');
  });
});
document.querySelectorAll('.color-swatch')[0].classList.add('active');

document.querySelectorAll('.size-btn').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.size-btn').forEach(x => x.classList.remove('active'));
    el.classList.add('active');
    drawState.size = parseInt(el.getAttribute('data-size'));
  });
});

$('clearBtn').addEventListener('click', () => {
  if (!canStartDrawing()) return;
  clearCanvas();
  const msg = { type: 'clear' };
  if (isHost) { recordCanvasEvent(msg); hostBroadcast(msg); }
  else if (hostConn) hostConn.send(msg);
});
$('fillBtn').addEventListener('click', () => {
  if (!canStartDrawing()) return;
  fillCanvas(drawState.color);
  const msg = { type: 'fill', color: drawState.color };
  if (isHost) { recordCanvasEvent(msg); hostBroadcast(msg); }
  else if (hostConn) hostConn.send(msg);
});
$('undoBtn').addEventListener('click', () => {
  if (!canStartDrawing()) return;
  // On undo, we locally redraw and ask everyone to do the same: we send a clear+replay.
  drawState.strokes.pop();
  clearCanvas();
  // Broadcast: tell them to clear, then stream all strokes
  const msgs = [{ type: 'clear' }];
  for (const s of drawState.strokes) {
    for (let i = 1; i < s.pts.length; i++) {
      msgs.push({ type: 'stroke', x1: s.pts[i-1][0], y1: s.pts[i-1][1], x2: s.pts[i][0], y2: s.pts[i][1], color: s.color, size: s.size });
      strokeLine(s.pts[i-1][0], s.pts[i-1][1], s.pts[i][0], s.pts[i][1], s.color, s.size);
    }
  }
  if (isHost) {
    // Rebuild canvas event log from scratch (clear + replay)
    G._canvasEvents = [];
    for (const m of msgs) { recordCanvasEvent(m); hostBroadcast(m); }
  } else if (hostConn) {
    for (const m of msgs) hostConn.send(m);
  }
});

/* ============================================================
   EVENT BINDINGS — MENU & LOBBY
   ============================================================ */
$('createBtn').addEventListener('click', createRoom);
$('joinBtn').addEventListener('click', joinRoom);
$('codeInput').addEventListener('input', e => { e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,''); });
$('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') createRoom(); });
$('codeInput').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });

$('startBtn').addEventListener('click', hostStartGame);
$('leaveBtn').addEventListener('click', () => resetToMenu());

$('chatInput').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const text = e.target.value.trim();
  if (!text) return;
  e.target.value = '';
  if (isHost) {
    const me = G.players.find(p => p.id === myPeerId);
    if (me) handleHostGuess(me, text);
  } else if (hostConn) {
    hostConn.send({ type: 'chat', text });
  }
});
